<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>My Google AI Studio App</title>
    <script>
      (function() {
        try {
          var _fetch = window.fetch;
          var defineFetch = function(obj) {
            if (obj) {
              try {
                Object.defineProperty(obj, 'fetch', {
                  configurable: true,
                  enumerable: true,
                  get: function() { return _fetch; },
                  set: function(v) { _fetch = v; }
                });
              } catch (e) {}
            }
          };
          defineFetch(window);
          defineFetch(globalThis);
          defineFetch(self);
        } catch (err) {
          console.warn("Fetch patch warning:", err);
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
